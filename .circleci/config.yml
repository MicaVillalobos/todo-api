version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.12
    environment:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: supersecretkeyforcircleci
      ENV: test
    steps:
      - checkout

      - run:
          name: Install UV
          command: curl -LsSf https://astral.sh/uv/install.sh | sh

      - run:
          name: Install dependencies
          command: uv sync

      - run:
          name: Run linting
          command: uv run ruff check app/

      - run:
          name: Run tests with coverage
          command: uv run pytest tests/ -v --cov=app --cov-report=lcov

      - run:
          name: Upload coverage to Coveralls
          command: uv run coveralls

workflows:
  version: 2
  build-and-test:
    jobs:
      - test
